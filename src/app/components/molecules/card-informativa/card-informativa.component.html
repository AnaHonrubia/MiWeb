<ion-card [style.--border-color]="colorBorde" class="card-atomica">
  <ion-card-content>
    <ion-avatar [style.border-color]="colorBorde" class="avatar-card">
      <img [src]="imagen" [alt]="titulo" />
    </ion-avatar>
    <h3>{{ titulo }}</h3>
    <p>{{ descripcion }}</p>
  </ion-card-content>
</ion-card>

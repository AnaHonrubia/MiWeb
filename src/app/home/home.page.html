<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-buttons slot="start">
      <ion-button (click)="scrollTo('sobre-mi')" style="--color: #ffffff; font-weight: 500;">Sobre mí</ion-button>
      <ion-button (click)="scrollTo('formacion')" style="--color: #00d2ff; font-weight: 500;">Formación</ion-button>
      <ion-button (click)="scrollTo('experiencia')" style="--color: #a29bfe; font-weight: 500;">Experiencia</ion-button>
    </ion-buttons>

    <ion-buttons slot="end" style="margin-right: 15px;">
      <ion-button (click)="openCV()" 
                  style="--background: #6c5ce7; 
                         color: white; 
                         --border-radius: 8px; 
                         font-weight: bold; 
                         padding: 0 10px;">
        Descargar CV
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" style="--background: #000000;">
  <div style="text-align: center; padding: 60px 20px;">
    <h1 style="font-size: 3.5em; font-weight: 800; background: linear-gradient(to right, #a29bfe, #6c5ce7, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
      Ana Honrubia Borja
    </h1>
    <p style="color: #888; font-size: 1.2em;">Estudiante de DAM | IES Leonardo Da Vinci</p>
  </div>

  </ion-content>
